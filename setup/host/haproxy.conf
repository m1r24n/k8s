cat << EOF | sudo tee /etc/haproxy/haproxy.conf
frontend k8s
    bind 192.168.250.101:6443
    mode tcp
    option tcplog
    default_backend k8smasters

backend k8smasters
    mode tcp
    balance roundrobin
    option tcp-check
    server node0 192.168.250.10:6443 check
    server node1 192.168.250.11:6443 check
    server node2 192.168.250.12:6443 check
EOF